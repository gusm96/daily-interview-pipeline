name: Build and Deploy to GCP

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}" # GCP 프로젝트 ID를 GitHub Secrets에서 불러와 사용합니다.
  REGION: "asia-northeast3"         # 리전 (예: 서울 리전)
  SERVICE_NAME: "daily-interview-bot"


jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation 인증을 위해 필요

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 1. Google Cloud 인증 (Workload Identity Federation)
    # 보안 정책상 서비스 계정 키 생성이 차단되므로, 보안이 우수하고 키가 필요 없는 WIF 인증을 사용합니다.
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'


    # =========================================================================
    # 선택지 A: Google Cloud Run 배포 (비활성화)
    # =========================================================================
    # 2. Artifact Registry 로그인
    # - name: Log in to Google Artifact Registry
    #   run: |
    #     gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
    # 
    # 3. Docker Image 빌드 및 푸시 (Artifact Registry 전송)
    # - name: Build and Push Docker Image
    #   run: |
    #     IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
    #     docker build -t $IMAGE_TAG .
    #     docker push $IMAGE_TAG
    #     echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
    # 
    # 4. Cloud Run 배포 (Serverless Container 구동)
    # - name: Deploy to Cloud Run
    #   uses: google-github-actions/deploy-cloudrun@v2
    #   with:
    #     service: ${{ env.SERVICE_NAME }}
    #     region: ${{ env.REGION }}
    #     image: ${{ env.IMAGE_TAG }}

    # =========================================================================
    # 선택지 B: Google Cloud Functions 배포 (활성화)
    # =========================================================================
    - name: Deploy to Cloud Functions
      uses: google-github-actions/deploy-cloud-functions@v3
      with:
        name: ${{ env.SERVICE_NAME }}

        runtime: python311
        entry_point: daily_interview_bot
        region: ${{ env.REGION }}
        project_id: ${{ env.PROJECT_ID }}
        # GitHub Secrets로부터 환경 변수를 주입합니다.
        env_vars: |
          GITHUB_TOKEN=${{ secrets.CUSTOM_GITHUB_TOKEN }}
          REPO_OWNER=${{ github.repository_owner }}
          REPO_NAME=${{ github.event.repository.name }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_CHANNEL_ID=${{ secrets.SLACK_CHANNEL_ID }}
          GEMINI_MODEL=gemini-2.0-flash
