    #   uses: google-github-actions/deploy-cloudfunctions@v2
    #   with:
    #     name: ${{ env.SERVICE_NAME }}
    #     runtime: python311
    #     entry_point: daily_interview_bot
    #     region: ${{ env.REGION }}
