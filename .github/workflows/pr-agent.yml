name: PR Agent (AI Code Reviewer)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # 봇이 생성한 이벤트는 무시 (무한루프 방지)
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: PR Agent action
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Google AI Studio에서 발급받은 Gemini API 키 매핑
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # PR-Agent 설정 (Double Underscore 사용)
          CONFIG__MODEL: "gemini/gemini-3.1-pro"
          CONFIG__MODEL_PROVIDER: "google"
          PR_REVIEWS__LANGUAGE: "Korean"
