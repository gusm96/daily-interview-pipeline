name: PR Agent (AI Code Reviewer)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # 봇이 생성한 이벤트는 무시 (무한루프 방지)
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: PR Agent action
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Google AI Studio에서 발급받은 Gemini API 키 매핑
          # PR-Agent가 OpenAI가 아닌 Gemini를 기본 제공자로 인식하게 하려면 아래의 전용 변수명이 필수입니다.
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # PR-Agent 설정 (언어 설정)
          PR_REVIEWS__LANGUAGE: "Korean"
